          weighted_average:
            - present_number_of_terraced_houses_2005_present
      - key: typical_useful_demand_for_space_heating_terraced_houses_future
        unit: 'kWh/m<sup>2</sup>'
        combination_method: average

  - header: share_useful_demand_houses
    type: slider
    combination_method:
      weighted_average:   
      # The sum of all households is used as the denominator for the weighted average of the share of useful demand for space heating.
      # Ideally we would use the useful demand of the households, but this is not available.
        - sum:
          - present_number_of_apartments_before_1945
          - present_number_of_apartments_1945_1964
          - present_number_of_apartments_1965_1984
          - present_number_of_apartments_1985_2004
          - present_number_of_apartments_2005_present
          - present_number_of_detached_houses_before_1945
          - present_number_of_detached_houses_1945_1964
          - present_number_of_detached_houses_1965_1984
          - present_number_of_detached_houses_1985_2004
          - present_number_of_detached_houses_2005_present
          - present_number_of_semi_detached_houses_before_1945
          - present_number_of_semi_detached_houses_1945_1964
          - present_number_of_semi_detached_houses_1965_1984
          - present_number_of_semi_detached_houses_1985_2004
          - present_number_of_semi_detached_houses_2005_present
          - present_number_of_terraced_houses_before_1945
          - present_number_of_terraced_houses_1945_1964
          - present_number_of_terraced_houses_1965_1984
          - present_number_of_terraced_houses_1985_2004
          - present_number_of_terraced_houses_2005_present
    items:
      - key: present_share_of_apartments_before_1945_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_apartments_1945_1964_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_apartments_1965_1984_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_apartments_1985_2004_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_apartments_2005_present_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_detached_houses_before_1945_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_detached_houses_1945_1964_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_detached_houses_1965_1984_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_detached_houses_1985_2004_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_detached_houses_2005_present_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_semi_detached_houses_before_1945_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_semi_detached_houses_1945_1964_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_semi_detached_houses_1965_1984_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_semi_detached_houses_1985_2004_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_semi_detached_houses_2005_present_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_terraced_houses_before_1945_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_terraced_houses_1945_1964_in_useful_demand_for_space_heating
        unit: '%'
      - key: present_share_of_terraced_houses_1965_1984_in_useful_demand_for_space_heating
