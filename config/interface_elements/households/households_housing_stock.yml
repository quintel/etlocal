        unit: '#'
      - key: present_number_of_detached_houses_1945_1964
        unit: '#'
      - key: present_number_of_detached_houses_1965_1984
        unit: '#'
      - key: present_number_of_detached_houses_1985_2004
        unit: '#'
      - key: present_number_of_detached_houses_2005_present
        unit: '#'
      - key: present_number_of_semi_detached_houses_before_1945
        unit: '#'
      - key: present_number_of_semi_detached_houses_1945_1964
        unit: '#'
      - key: present_number_of_semi_detached_houses_1965_1984
        unit: '#'
      - key: present_number_of_semi_detached_houses_1985_2004
        unit: '#'
      - key: present_number_of_semi_detached_houses_2005_present
        unit: '#'
      - key: present_number_of_terraced_houses_before_1945
        unit: '#'
      - key: present_number_of_terraced_houses_1945_1964
        unit: '#'
      - key: present_number_of_terraced_houses_1965_1984
        unit: '#'
      - key: present_number_of_terraced_houses_1985_2004
        unit: '#'
