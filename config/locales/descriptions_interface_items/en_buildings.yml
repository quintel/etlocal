en:
  descriptions:
    interface_items:
      present_number_of_buildings:
        Total number of non-residential buildings, expressed in residence equivalents. The number of
        residence equivalents is defined as the total surface area for non-residential buildings
        divided by the typical surface area per residence.
      buildings_roof_surface_available_for_pv: |
        Suitable roof surface for solar panels, assuming a reasonable annual yield
        (so largely south-facing). The ETM uses 'net' available surface: we assume that the
        entire surface can be covered by solar panels.
      buildings_final_demand_electricity_demand: |
        Including electricity demand 'behind the meter' of (for example) locally produced solar electricity.
        Excluding electricity used for electric transport (EV).
      buildings_final_demand_network_gas_demand: |
        Mix of natural gas and green gas
      buildings_final_demand_solar_thermal_demand: |
        In the ETM, solar thermal can be used for the production of hot water, not for space heating.
      area_per_building_residence_equivalent: |
        This attribute is used to express the number of non-residential buildings in residence
        equivalents. The number of residence equivalents is defined as the total surface area for
        non-residential buildings divided by the typical surface area per residence.
